<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraktu's Basement | Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #0b0d12;
            --bg2:         #10121a;
            --panel:       #13161f;
            --panel-hover: #191d28;
            --border:      rgba(255,255,255,0.06);
            --text:        #e8eaf0;
            --muted:       #5a6070;
            --accent:      #5865f2;

            --ht1: #e84040; --lt1: #e86060;
            --ht2: #e87820; --lt2: #e89840;
            --ht3: #d4a800; --lt3: #d4bc40;
            --ht4: #3aaa50; --lt4: #60c070;
            --ht5: #4a70e8; --lt5: #7090e0;

            --gold:   #e8a200;
            --silver: #8090a8;
            --bronze: #a06030;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        /* ══ NAVBAR ══════════════════════════════════════════════ */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 64px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.7rem; letter-spacing: 2px;
            color: var(--text); cursor: pointer;
            text-decoration: none;
        }
        .logo span { color: var(--gold); }

        .nav-right { display: flex; gap: 12px; align-items: center; }

        .search-wrap {
            display: flex; align-items: center; gap: 8px;
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; padding: 0 14px; height: 38px;
            transition: border-color 0.2s;
        }
        .search-wrap:focus-within { border-color: rgba(255,255,255,0.2); }
        .search-wrap svg { color: var(--muted); flex-shrink: 0; }
        .search-wrap input {
            background: none; border: none; color: var(--text);
            font-family: 'DM Sans', sans-serif; font-size: 0.875rem;
            width: 180px; outline: none;
        }
        .search-wrap input::placeholder { color: var(--muted); }

        .discord-btn {
            display: flex; align-items: center; gap: 6px;
            background: var(--accent); color: #fff;
            text-decoration: none; padding: 0 16px; height: 38px;
            border-radius: 8px; font-weight: 700; font-size: 0.85rem;
            transition: filter 0.2s, transform 0.15s;
        }
        .discord-btn:hover { filter: brightness(1.15); transform: translateY(-1px); }

        /* ══ TABS ════════════════════════════════════════════════ */
        .tabs-row {
            display: flex; gap: 4px; padding: 16px 40px 0;
            overflow-x: auto; border-bottom: 1px solid var(--border);
        }
        .tabs-row::-webkit-scrollbar { display: none; }

        .tab {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; padding: 10px 20px 14px;
            cursor: pointer; color: var(--muted);
            font-size: 0.78rem; font-weight: 700; letter-spacing: 0.5px;
            white-space: nowrap; transition: color 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px; user-select: none;
        }
        .tab:hover { color: rgba(255,255,255,0.7); }
        .tab.active { color: #fff; border-bottom-color: #fff; }

        .tab-icon { font-size: 1.3rem; line-height: 1; }

        /* ══ MAIN CONTENT ════════════════════════════════════════ */
        .content { padding: 0 40px 60px; max-width: 1400px; margin: 0 auto; }

        /* ══ LEADERBOARD TABLE ═══════════════════════════════════ */
        .lb-table { width: 100%; margin-top: 8px; }

        .lb-head {
            display: grid;
            grid-template-columns: 110px 1fr 80px 1fr 120px;
            padding: 10px 0 10px 0;
            color: var(--muted); font-size: 0.7rem;
            font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }
        .lb-head > * { padding: 0 8px; }
        .col-tiers { text-align: right; }
        .col-pts   { text-align: right; padding-right: 20px; }

        .lb-row {
            display: grid;
            grid-template-columns: 110px 1fr 80px 1fr 120px;
            align-items: center;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            cursor: pointer; position: relative;
            min-height: 80px;
        }
        .lb-row:hover { background: var(--panel-hover); }

        /* rank cell */
        .rank-cell { display: flex; align-items: center; height: 100%; padding: 0 0 0 16px; }
        .rank-badge {
            display: flex; align-items: center; justify-content: center;
            width: 68px; height: 52px;
            font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
            flex-shrink: 0;
        }
        .rank-1 .rank-badge { background: linear-gradient(135deg, #e8a200, #c47800); color: #fff; }
        .rank-2 .rank-badge { background: linear-gradient(135deg, #8090a8, #5a6878); color: #fff; }
        .rank-3 .rank-badge { background: linear-gradient(135deg, #a06030, #704020); color: #fff; }
        .rank-other .rank-badge { background: rgba(255,255,255,0.05); color: var(--muted); font-size: 1.5rem; }

        /* player cell */
        .player-cell { display: flex; align-items: center; gap: 14px; padding: 12px 8px; }
        .player-avatar { width: 48px; height: 48px; border-radius: 6px; image-rendering: pixelated; flex-shrink: 0; }
        .player-name { font-size: 1.15rem; font-weight: 800; color: #fff; line-height: 1.2; }
        .player-rank-label {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.78rem; color: var(--muted); font-weight: 600;
            margin-top: 3px;
        }
        .rank-diamond {
            width: 10px; height: 10px; border-radius: 2px;
            transform: rotate(45deg); flex-shrink: 0;
        }

        /* region cell */
        .region-cell { display: flex; align-items: center; padding: 0 8px; }
        .region-badge {
            padding: 4px 10px; border-radius: 5px; font-size: 0.75rem;
            font-weight: 800; letter-spacing: 1px;
        }
        .region-NA { background: #c0392b; color: #fff; }
        .region-EU { background: #27ae60; color: #fff; }
        .region-AS { background: #2980b9; color: #fff; }

        /* tier icons cell */
        .tiers-cell {
            display: flex; align-items: center; gap: 8px;
            flex-wrap: wrap; padding: 8px;
        }

        .tier-icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tier-circle {
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; line-height: 1;
            background: var(--panel); border: 2px solid;
            transition: transform 0.15s;
        }
        .tier-circle:hover { transform: scale(1.15); }
        .tier-label-small {
            font-size: 0.6rem; font-weight: 900; letter-spacing: 0.5px;
            text-align: center; line-height: 1;
        }

        /* Tier border + label colors */
        .t-ht1 { border-color: var(--ht1); } .lbl-ht1 { color: var(--ht1); }
        .t-lt1 { border-color: var(--lt1); } .lbl-lt1 { color: var(--lt1); }
        .t-ht2 { border-color: var(--ht2); } .lbl-ht2 { color: var(--ht2); }
        .t-lt2 { border-color: var(--lt2); } .lbl-lt2 { color: var(--lt2); }
        .t-ht3 { border-color: var(--ht3); } .lbl-ht3 { color: var(--ht3); }
        .t-lt3 { border-color: var(--lt3); } .lbl-lt3 { color: var(--lt3); }
        .t-ht4 { border-color: var(--ht4); } .lbl-ht4 { color: var(--ht4); }
        .t-lt4 { border-color: var(--lt4); } .lbl-lt4 { color: var(--lt4); }
        .t-ht5 { border-color: var(--ht5); } .lbl-ht5 { color: var(--ht5); }
        .t-lt5 { border-color: var(--lt5); } .lbl-lt5 { color: var(--lt5); }

        /* points cell */
        .pts-cell {
            text-align: right; padding-right: 20px;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem; color: var(--muted);
        }
        .pts-cell span { color: var(--gold); }

        /* ══ TIER GRID VIEW ═══════════════════════════════════════ */
        .tier-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 12px; margin-top: 8px;
        }
        .tier-col {
            background: var(--panel); border-radius: 10px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .tier-col-header {
            padding: 12px 16px; font-family: 'Bebas Neue', sans-serif;
            font-size: 1.1rem; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .tier-col-sub { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.4); font-family: 'DM Sans', sans-serif; }

        .tier-player-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; border-bottom: 1px solid var(--border);
            transition: background 0.15s; cursor: pointer;
        }
        .tier-player-row:hover { background: var(--panel-hover); }
        .tier-player-left { display: flex; align-items: center; gap: 8px; }
        .tier-small-avatar { width: 24px; height: 24px; border-radius: 4px; image-rendering: pixelated; }
        .tier-small-name { font-size: 0.82rem; font-weight: 700; }
        .tier-elo-badge { font-size: 0.65rem; font-weight: 800; color: var(--muted); }

        .empty-tier { padding: 16px; text-align: center; color: var(--muted); font-size: 0.8rem; }

        /* ══ EMPTY STATE ══════════════════════════════════════════ */
        .empty-state {
            padding: 80px 20px; text-align: center; color: var(--muted);
            grid-column: 1 / -1;
        }
        .empty-state p { font-size: 0.9rem; margin-top: 8px; }

        /* ══ ANIMATIONS ══════════════════════════════════════════ */
        .fade-in { animation: fadeUp 0.35s cubic-bezier(0.2,0.8,0.2,1) both; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .lb-row { animation: fadeUp 0.3s both; }
        .lb-row:nth-child(1) { animation-delay: 0.03s; }
        .lb-row:nth-child(2) { animation-delay: 0.06s; }
        .lb-row:nth-child(3) { animation-delay: 0.09s; }
        .lb-row:nth-child(4) { animation-delay: 0.12s; }
        .lb-row:nth-child(5) { animation-delay: 0.15s; }
    </style>
</head>
<body>

<!-- ══ NAVBAR ══════════════════════════════════════════════════ -->
<nav class="navbar">
    <a class="logo" onclick="location.reload()">FRAKTU'S <span>BASEMENT</span></a>
    <div class="nav-right">
        <div class="search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="search" placeholder="Search player...  /" onkeyup="render()">
        </div>
        <a href="https://discord.gg/5rnJVnswzj" target="_blank" class="discord-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.8 19.8 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
            Discord
        </a>
    </div>
</nav>

<!-- ══ TABS ════════════════════════════════════════════════════ -->
<div class="tabs-row" id="tabs"></div>

<!-- ══ CONTENT ═════════════════════════════════════════════════ -->
<div class="content" id="content"></div>

<script>
// ── Constants ─────────────────────────────────────────────────
const MODES = ["Overall","Vanilla","LTMs","UHC","Pot","NethOP","SMP","Sword","Axe","Mace"];
const MODE_ICONS = {
    "Overall":"🏆","Vanilla":"⚔️","LTMs":"🎯","UHC":"❤️",
    "Pot":"🧪","NethOP":"🟣","SMP":"🌍","Sword":"🗡️","Axe":"🪓","Mace":"🔨"
};
// Points each tier is worth
const TIER_PTS = {
    HT1:50, LT1:45, HT2:40, LT2:35, HT3:30,
    LT3:25, HT4:20, LT4:15, HT5:10, LT5:5
};
// Combat rank titles
const COMBAT_RANKS = [
    [380,"Combat Legend"],
    [280,"Combat Master"],
    [190,"Combat Ace"],
    [120,"Combat Expert"],
    [60, "Combat Warrior"],
    [0,  "Combat Rookie"],
];
// Diamond colours for rank titles
const RANK_COLORS = {
    "Combat Legend": "#e84040",
    "Combat Master": "#e87820",
    "Combat Ace":    "#d4a800",
    "Combat Expert": "#3aaa50",
    "Combat Warrior":"#4a70e8",
    "Combat Rookie": "#5a6070",
};

let currentMode = "Overall";
let players = {};

// ── Tier helpers ──────────────────────────────────────────────
function getTier(elo) {
    if (elo >= 2400) return "HT1"; if (elo >= 2200) return "LT1";
    if (elo >= 2000) return "HT2"; if (elo >= 1800) return "LT2";
    if (elo >= 1600) return "HT3"; if (elo >= 1400) return "LT3";
    if (elo >= 1300) return "HT4"; if (elo >= 1200) return "LT4";
    if (elo >= 1100) return "HT5"; return "LT5";
}

function totalPoints(p) {
    return Object.values(p.elo).reduce((s, e) => s + (TIER_PTS[getTier(e)] || 0), 0);
}

function combatRank(pts) {
    for (const [threshold, label] of COMBAT_RANKS)
        if (pts >= threshold) return label;
    return "Combat Rookie";
}

function tierCircle(mode, elo) {
    const tier = getTier(elo);
    const icon = MODE_ICONS[mode] || "⚔️";
    const cls  = tier.toLowerCase();
    return `
    <div class="tier-icon-wrap">
        <div class="tier-circle t-${cls}" title="${mode}: ${tier} (${elo})">${icon}</div>
        <div class="tier-label-small lbl-${cls}">${tier}</div>
    </div>`;
}

// ── Data ──────────────────────────────────────────────────────
async function refresh() {
    try {
        const res  = await fetch('players.json?t=' + Date.now());
        const data = await res.json();
        players = data.players;
        renderTabs();
        render();
    } catch(e) { console.log("Waiting for data..."); }
}

// ── Tabs ──────────────────────────────────────────────────────
function renderTabs() {
    document.getElementById('tabs').innerHTML = MODES.map(m => `
        <div class="tab ${m === currentMode ? 'active' : ''}" onclick="setMode('${m}')">
            <span class="tab-icon">${MODE_ICONS[m]}</span>
            ${m}
        </div>
    `).join('');
}

function setMode(m) {
    if (currentMode === m) return;
    currentMode = m;
    renderTabs();
    render();
}

// ── Render ────────────────────────────────────────────────────
function render() {
    const el     = document.getElementById('content');
    const search = document.getElementById('search').value.toLowerCase();
    const list   = Object.values(players).filter(p =>
        (p.ign || p.name).toLowerCase().includes(search)
    );

    el.innerHTML = '';

    if (currentMode === 'Overall') renderOverall(el, list);
    else                           renderGrid(el, list);
}

// ── Overall leaderboard ───────────────────────────────────────
function renderOverall(el, list) {
    list.sort((a,b) => totalPoints(b) - totalPoints(a));

    if (!list.length) {
        el.innerHTML = `<div class="empty-state"><h3>No players yet</h3><p>Verify some players to get started!</p></div>`;
        return;
    }

    const gameModes = ["LTMs","Vanilla","UHC","Pot","NethOP","SMP","Sword","Axe","Mace"];

    let html = `
    <div class="lb-table">
        <div class="lb-head">
            <div>#</div>
            <div>PLAYER</div>
            <div>REGION</div>
            <div>TIERS</div>
            <div class="col-pts">PTS</div>
        </div>`;

    list.forEach((p, i) => {
        const ign      = p.ign || p.name;
        const pts      = totalPoints(p);
        const cr       = combatRank(pts);
        const crColor  = RANK_COLORS[cr] || '#5a6070';
        const rankCls  = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';

        const tierIcons = gameModes.map(m => tierCircle(m, p.elo[m] ?? 1000)).join('');

        html += `
        <div class="lb-row ${rankCls}">
            <div class="rank-cell">
                <div class="rank-badge">${i+1}</div>
            </div>
            <div class="player-cell">
                <img class="player-avatar" src="https://mc-heads.net/avatar/${ign}/48" loading="lazy" alt="${ign}">
                <div>
                    <div class="player-name">${ign}</div>
                    <div class="player-rank-label">
                        <div class="rank-diamond" style="background:${crColor}"></div>
                        ${cr} (${pts} pts)
                    </div>
                </div>
            </div>
            <div class="region-cell">
                <span class="region-badge region-NA">NA</span>
            </div>
            <div class="tiers-cell">${tierIcons}</div>
            <div class="pts-cell"><span>${pts}</span></div>
        </div>`;
    });

    el.innerHTML = html + `</div>`;
}

// ── Per-mode tier grid ────────────────────────────────────────
function renderGrid(el, list) {
    const cols = {1:[],2:[],3:[],4:[],5:[]};

    list.forEach(p => {
        const elo = p.elo[currentMode];
        if (elo === undefined) return;
        const tier = getTier(elo);
        const num  = parseInt(tier.replace(/\D/g,''));
        if (cols[num]) cols[num].push({...p, _elo: elo, _tier: tier});
    });

    const total = Object.values(cols).reduce((s,c) => s + c.length, 0);
    if (!total) {
        el.innerHTML = `<div class="empty-state"><h3>No players in ${currentMode} yet</h3><p>Report some matches to populate this leaderboard!</p></div>`;
        return;
    }

    const TIER_HEAD_COLORS = ['#e84040','#e87820','#d4a800','#3aaa50','#4a70e8'];

    let html = `<div class="tier-grid">`;
    for (let i = 1; i <= 5; i++) {
        const col    = cols[i].sort((a,b) => b._elo - a._elo);
        const ht     = `HT${i}`, lt = `LT${i}`;
        const hColor = TIER_HEAD_COLORS[i-1];

        const rows = col.map(p => {
            const ign = p.ign || p.name;
            return `
            <div class="tier-player-row">
                <div class="tier-player-left">
                    <img class="tier-small-avatar" src="https://mc-heads.net/avatar/${ign}/24" loading="lazy">
                    <span class="tier-small-name">${ign}</span>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
                    <span class="tier-label-small lbl-${p._tier.toLowerCase()}">${p._tier}</span>
                    <span class="tier-elo-badge">${p._elo}</span>
                </div>
            </div>`;
        }).join('') || `<div class="empty-tier">Empty</div>`;

        html += `
        <div class="tier-col fade-in" style="animation-delay:${(i-1)*0.06}s">
            <div class="tier-col-header" style="border-left: 3px solid ${hColor}">
                <span>TIER ${i}</span>
                <span class="tier-col-sub">${col.length} PLAYER${col.length !== 1 ? 'S' : ''}</span>
            </div>
            ${rows}
        </div>`;
    }
    el.innerHTML = html + `</div>`;
}

// ── Init ──────────────────────────────────────────────────────
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
