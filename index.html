<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraktu's Basement | MCTiers Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        :root {
            --bg: #0a0a0c;
            --card: #121216;
            --accent: #5865F2;
            --border: #25252b;
            --ht1: #ff4d4d; --ht2: #ff7675; --ht3: #fab1a0;
            --lt1: #74b9ff; --lt2: #81ecec; --lt3: #55efc4; --lt4: #ffeaa7; --lt5: #b2bec3;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            width: 100%;
            background: rgba(18, 18, 22, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            position: sticky;
            top: 0;
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: #888;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn.active, .nav-btn:hover {
            border-color: var(--accent);
            color: white;
            background: rgba(88, 101, 242, 0.1);
        }

        header { text-align: center; padding: 60px 20px; }
        header h1 { font-weight: 800; font-size: 3rem; margin: 0; letter-spacing: -2px; }
        
        .discord-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            background: rgba(88, 101, 242, 0.1);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--accent);
        }

        .container {
            width: 90%;
            max-width: 1100px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 100px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; font-size: 0.75rem; text-transform: uppercase; color: #555; }
        td { padding: 15px 20px; border-top: 1px solid var(--border); }

        .player-cell { display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .player-cell img { border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .tier {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .tier-ht1 { background: rgba(255, 77, 77, 0.15); color: var(--ht1); border: 1px solid var(--ht1); }
        /* Repeat for other tiers */
        .tier-lt5 { background: rgba(178, 190, 195, 0.15); color: var(--lt5); border: 1px solid var(--lt5); }

        .elo-val { font-family: 'Courier New', monospace; font-weight: bold; color: #eee; }
    </style>
</head>
<body>

<nav id="mode-nav"></nav>

<header>
    <h1>FRAKTU'S BASEMENT</h1>
    <a href="https://discord.gg/uz4qSzDV2D" class="discord-link">
        <i class="fab fa-discord"></i> Official Tier Server
    </a>
</header>

<div class="container">
    <table>
        <thead>
            <tr>
                <th>Rank</th>
                <th>Active Player</th>
                <th>Rating</th>
                <th>Tier</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
    </table>
</div>

<script>
    const MODES = ["Vanilla", "LTMs", "UHC", "Pot", "NethOP", "SMP", "Sword", "Axe", "Mace"];
    let currentMode = "Vanilla";

    const nav = document.getElementById('mode-nav');
    MODES.forEach(m => {
        const b = document.createElement('button');
        b.className = `nav-btn ${m === currentMode ? 'active' : ''}`;
        b.innerText = m;
        b.onclick = () => { 
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            currentMode = m; load(); 
        };
        nav.appendChild(b);
    });

    function getT(e) {
        if (e >= 2500) return "HT1"; if (e >= 2200) return "HT2"; if (e >= 2000) return "HT3";
        if (e >= 1800) return "LT1"; if (e >= 1600) return "LT2"; if (e >= 1400) return "LT3";
        if (e >= 1200) return "LT4"; return "LT5";
    }

    function load() {
        fetch('players.json?v=' + Date.now()).then(r => r.json()).then(data => {
            const body = document.getElementById('leaderboard-body');
            body.innerHTML = '';
            
            const players = Object.values(data.players)
                .sort((a,b) => (b.elo[currentMode] || 1000) - (a.elo[currentMode] || 1000));

            players.forEach((p, i) => {
                const elo = p.elo[currentMode] || 1000;
                const tier = getT(elo);
                body.innerHTML += `
                    <tr>
                        <td style="color:#444; font-weight:800; font-size:1.2rem;">${i+1}</td>
                        <td class="player-cell">
                            <img src="https://mc-heads.net/avatar/${p.ign || 'Steve'}/32">
                            ${p.name} <span style="color:#444; font-size:0.8rem;">(${p.ign})</span>
                        </td>
                        <td class="elo-val">${elo}</td>
                        <td><span class="tier tier-${tier.toLowerCase()}">${tier}</span></td>
                    </tr>
                `;
            });
        });
    }
    load();
</script>
</body>
</html>
