<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraktu's Basement | Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f111a;
            --panel: #161923;
            --panel-light: #1f2330;
            --accent: #5865f2;
            --text-main: #ffffff;
            --text-dim: #8e9297;
            /* Tier Colors */
            --ht1: #ffb13b; --ht2: #ffcc33; --ht3: #ffee33;
            --lt1: #cbd5e0; --lt2: #a0aec0; --lt3: #718096;
            --lt4: #cd7f32; --lt5: #444444;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0 40px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Navbar & Logo */
        .navbar {
            width: 100%; max-width: 1300px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 0;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; cursor: pointer; text-transform: uppercase; font-style: italic; }
        .logo span { color: var(--ht1); }

        .search-box {
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px; border-radius: 8px; color: white; width: 250px; outline: none;
        }

        /* Tabs */
        .tabs-container {
            display: flex; gap: 10px; margin-bottom: 40px; width: 100%; max-width: 1300px;
            overflow-x: auto; padding-bottom: 10px;
        }
        .tab {
            padding: 12px 24px; border-radius: 10px; cursor: pointer;
            font-weight: 700; color: var(--text-dim); transition: 0.2s;
            background: var(--panel); border: 1px solid transparent;
        }
        .tab:hover { background: var(--panel-light); color: white; }
        .tab.active { background: var(--panel-light); color: white; border-bottom: 3px solid var(--ht1); border-radius: 10px 10px 0 0; }

        /* OVERALL TABLE VIEW */
        .overall-container { width: 100%; max-width: 1300px; background: var(--panel); border-radius: 15px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr { border-bottom: 1px solid rgba(255,255,255,0.02); transition: 0.2s; cursor: pointer; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .rank-col { font-family: 'Montserrat'; font-style: italic; font-weight: 900; font-size: 1.4rem; padding-left: 30px; opacity: 0.2; }
        tr:nth-child(1) .rank-col { color: var(--ht1); opacity: 1; }
        
        .p-cell { display: flex; align-items: center; gap: 15px; padding: 15px 0; }
        .avatar { width: 45px; height: 45px; border-radius: 8px; image-rendering: pixelated; }
        .p-name { font-weight: 800; font-size: 1.1rem; }
        
        .tier-pill-list { display: flex; gap: 6px; flex-wrap: wrap; }
        .tier-pill {
            padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 900;
            color: #000; display: flex; align-items: center; gap: 4px;
        }

        /* GRID TIER VIEW (For Specific Modes) */
        .tier-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;
            width: 100%; max-width: 1300px; margin-bottom: 50px;
        }
        .tier-column { background: var(--panel); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .tier-header { 
            padding: 15px; text-align: center; font-weight: 900; font-size: 1.2rem;
            font-family: 'Montserrat'; font-style: italic; border-bottom: 2px solid rgba(0,0,0,0.2);
        }
        .th-1 { background: var(--ht1); color: #000; }
        .th-2 { background: var(--ht2); color: #000; }
        .th-3 { background: var(--ht3); color: #000; }
        .th-4 { background: var(--lt1); color: #000; }
        .th-5 { background: var(--lt2); color: #000; }

        .tier-player-card {
            display: flex; align-items: center; gap: 10px; padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.02); transition: 0.2s;
        }
        .tier-player-card:hover { background: rgba(255,255,255,0.05); }
        .small-avatar { width: 24px; height: 24px; border-radius: 4px; image-rendering: pixelated; }
        .small-name { font-size: 0.85rem; font-weight: 600; }

        /* Modal styling remains similar to previous... */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal { background: var(--panel); padding: 40px; border-radius: 20px; text-align: center; width: 400px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo" onclick="location.reload()">FRAKTU<span>BASY</span></div>
        <input type="text" class="search-box" id="search" placeholder="Search player..." onkeyup="render()">
    </div>

    <div class="tabs-container" id="tab-list"></div>

    <div id="main-content" style="width: 100%; display: flex; justify-content: center;">
        </div>

    <script>
        const MODES = ["Overall", "Vanilla", "LTMs", "UHC", "Pot", "NethOP", "SMP", "Sword", "Axe", "Mace"];
        let currentMode = "Overall";
        let players = {};

        function getTierLabel(elo) {
            if (elo >= 2500) return "HT1"; if (elo >= 2200) return "HT2";
            if (elo >= 2000) return "HT3"; if (elo >= 1800) return "LT1";
            if (elo >= 1600) return "LT2"; if (elo >= 1400) return "LT3";
            if (elo >= 1200) return "LT4"; return "LT5";
        }

        async function refresh() {
            const res = await fetch('players.json?t=' + Date.now());
            const data = await res.json();
            players = data.players;
            renderTabs();
            render();
        }

        function renderTabs() {
            document.getElementById('tab-list').innerHTML = MODES.map(m => `
                <div class="tab ${m === currentMode ? 'active' : ''}" onclick="setMode('${m}')">${m}</div>
            `).join('');
        }

        function setMode(m) { currentMode = m; renderTabs(); render(); }

        function render() {
            const container = document.getElementById('main-content');
            const search = document.getElementById('search').value.toLowerCase();
            const filteredPlayers = Object.values(players).filter(p => (p.ign || p.name).toLowerCase().includes(search));

            if (currentMode === "Overall") {
                renderOverallTable(container, filteredPlayers);
            } else {
                renderTierGrid(container, filteredPlayers);
            }
        }

        function renderOverallTable(container, list) {
            list.sort((a,b) => {
                const getAvg = p => Object.values(p.elo).reduce((s,e)=>s+e,0);
                return getAvg(b) - getAvg(a);
            });

            let html = `<div class="overall-container"><table><thead><tr>
                <th style="width:70px">#</th><th>Player</th><th>Region</th><th>All Tiers</th><th style="text-align:right">Avg</th>
            </tr></thead><tbody>`;

            list.forEach((p, i) => {
                const ign = p.ign || p.name;
                const tiersHtml = Object.entries(p.elo).map(([mode, elo]) => {
                    const label = getTierLabel(elo);
                    return `<div class="tier-pill" style="background:var(--${label.toLowerCase()})">${label}</div>`;
                }).join('');

                const avg = Math.round(Object.values(p.elo).reduce((s,e)=>s+e,0) / MODES.length);

                html += `<tr>
                    <td class="rank-col">${i+1}</td>
                    <td><div class="p-cell"><img src="https://mc-heads.net/avatar/${ign}/45" class="avatar">
                        <div><div class="p-name">${ign}</div><div style="font-size:0.7rem; color:var(--text-dim)">Basement Warrior</div></div>
                    </div></td>
                    <td><span style="background:#333; padding:4px 8px; border-radius:4px; font-size:0.7rem; font-weight:800;">NA</span></td>
                    <td><div class="tier-pill-list">${tiersHtml}</div></td>
                    <td style="text-align:right; padding-right:20px; font-weight:900; color:var(--ht1)">${avg}</td>
                </tr>`;
            });
            container.innerHTML = html + `</tbody></table></div>`;
        }

        function renderTierGrid(container, list) {
            // Group players into Tiers 1-5 for the specific mode
            const columns = { 1:[], 2:[], 3:[], 4:[], 5:[] };
            list.forEach(p => {
                const elo = p.elo[currentMode];
                const label = getTierLabel(elo);
                const tierNum = label.includes('HT') ? (label === 'HT1' ? 1 : label === 'HT2' ? 2 : 3) : (label === 'LT1' ? 4 : 5);
                columns[tierNum].push({ ...p, elo: elo });
            });

            let html = `<div class="tier-grid">`;
            for(let i=1; i<=5; i++) {
                html += `<div class="tier-column">
                    <div class="tier-header th-${i}">Tier ${i}</div>
                    ${columns[i].sort((a,b)=>b.elo-a.elo).map(p => `
                        <div class="tier-player-card">
                            <img src="https://mc-heads.net/avatar/${p.ign || p.name}/24" class="small-avatar">
                            <span class="small-name">${p.ign || p.name}</span>
                        </div>
                    `).join('')}
                </div>`;
            }
            container.innerHTML = html + `</div>`;
        }

        refresh();
        setInterval(refresh, 30000);
    </script>
</body>
</html>
