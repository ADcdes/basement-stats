<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraktu's Basement | Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0b10;
            --panel: #111218;
            --accent: #5865f2;
            --text-dim: #72767d;
            --ht1: #ffb13b; --ht2: #ffcc33; --ht3: #ffee33;
            --lt1: #cbd5e0; --lt2: #a0aec0; --lt3: #718096;
            --lt4: #cd7f32; --lt5: #444444;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0 5%;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Navbar */
        .navbar {
            width: 100%; max-width: 1200px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 0;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; }
        .logo span { color: var(--ht1); }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        .discord-btn {
            background: var(--accent); color: white;
            padding: 10px 18px; border-radius: 8px;
            text-decoration: none; font-weight: 700; font-size: 0.85rem;
            display: flex; align-items: center; gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
        }
        .discord-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(88, 101, 242, 0.4); filter: brightness(1.1); }

        .search-box {
            background: #1a1b23; border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px; border-radius: 8px; color: white; width: 220px;
            outline: none; transition: var(--transition);
        }
        .search-box:focus { border-color: var(--accent); width: 280px; background: #22232b; }

        /* Tabs */
        .tabs-container {
            display: flex; gap: 8px; margin-bottom: 40px;
            background: rgba(255,255,255,0.03); padding: 8px; border-radius: 12px;
        }
        .tab {
            padding: 10px 22px; border-radius: 8px; cursor: pointer;
            font-weight: 700; color: var(--text-dim); transition: var(--transition);
            user-select: none;
        }
        .tab:hover { color: white; background: rgba(255,255,255,0.05); transform: translateY(-1px); }
        .tab.active { background: var(--panel); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.4); transform: scale(1.05); }

        /* Table */
        .lb-card {
            width: 100%; max-width: 1150px;
            background: var(--panel); border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        tr { transition: var(--transition); border-bottom: 1px solid rgba(255,255,255,0.02); }
        tr:hover { background: rgba(255,255,255,0.03); }

        .rank-num {
            padding-left: 35px; font-family: 'Montserrat', sans-serif;
            font-weight: 900; font-size: 1.5rem; font-style: italic; color: rgba(255,255,255,0.05);
            transition: var(--transition);
        }
        tr:hover .rank-num { transform: scale(1.2) translateX(5px); }
        tr:nth-child(1) .rank-num { color: var(--ht1); text-shadow: 0 0 15px rgba(255,177,59,0.3); }

        .player-cell { display: flex; align-items: center; gap: 18px; padding: 18px 0; }
        .avatar { width: 44px; height: 44px; border-radius: 8px; image-rendering: pixelated; transition: var(--transition); }
        tr:hover .avatar { transform: rotate(-5deg) scale(1.1); }
        
        .p-name { font-weight: 700; font-size: 1.15rem; }
        .p-sub { font-size: 0.75rem; color: var(--text-dim); }

        .region-badge {
            background: rgba(255, 71, 87, 0.1); color: #ff4757;
            padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.7rem;
        }

        .tier-list { display: flex; gap: 6px; }
        .tier-icon {
            width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.55rem; font-weight: 900; color: #000;
            border: 1px solid rgba(255,255,255,0.1); cursor: help;
            transition: var(--transition);
        }
        .tier-icon:hover { transform: scale(1.3) translateY(-5px); z-index: 10; }

        .t-ht1 { background: var(--ht1); box-shadow: 0 0 8px rgba(255,177,59,0.3); }
        .t-lt1 { background: var(--lt1); }
        .t-lt5 { background: var(--lt5); color: #ccc; }

        .rating-col { text-align: right; padding-right: 35px; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">FRAKTU'S <span>BASEMENT</span></div>
        <div class="nav-right">
            <input type="text" class="search-box" id="search" placeholder="Search player..." onkeyup="doSearch()">
            <a href="https://discord.gg/ykR6agcE9P" target="_blank" class="discord-btn">JOIN DISCORD</a>
        </div>
    </div>

    <div class="tabs-container" id="tab-list"></div>

    <div class="lb-card">
        <table>
            <thead>
                <tr>
                    <th style="width: 100px;">#</th>
                    <th>Player</th>
                    <th>Region</th>
                    <th>Tiers</th>
                    <th class="rating-col">Rating</th>
                </tr>
            </thead>
            <tbody id="lb-body"></tbody>
        </table>
    </div>

    <script>
        const MODES = ["Overall", "Vanilla", "LTMs", "UHC", "Pot", "NethOP", "SMP", "Sword", "Axe", "Mace"];
        let currentMode = "Overall";
        let players = {};

        function getTier(elo) {
            if (elo >= 2500) return "HT1";
            if (elo >= 2200) return "HT2";
            if (elo >= 2000) return "HT3";
            if (elo >= 1800) return "LT1";
            if (elo >= 1600) return "LT2";
            if (elo >= 1400) return "LT3";
            if (elo >= 1200) return "LT4";
            return "LT5";
        }

        async function refresh() {
            try {
                const res = await fetch('players.json');
                const data = await res.json();
                players = data.players;
                renderTabs();
                render();
            } catch(e) { console.log("Waiting for players.json..."); }
        }

        function renderTabs() {
            document.getElementById('tab-list').innerHTML = MODES.map(m => `
                <div class="tab ${m === currentMode ? 'active' : ''}" onclick="setMode('${m}')">${m}</div>
            `).join('');
        }

        function setMode(m) { currentMode = m; renderTabs(); render(); }

        function render(filter = "") {
            const body = document.getElementById('lb-body');
            body.innerHTML = '';

            const sorted = Object.values(players)
                .map(p => ({ ...p, overallElo: Math.round(Object.values(p.elo).reduce((a,b)=>a+b,0)/9) }))
                .filter(p => (p.ign || p.name).toLowerCase().includes(filter.toLowerCase()))
                .sort((a,b) => (currentMode === "Overall" ? b.overallElo - a.overallElo : b.elo[currentMode] - a.elo[currentMode]));

            sorted.forEach((p, i) => {
                const ign = p.ign || p.name;
                const score = currentMode === "Overall" ? p.overallElo : p.elo[currentMode];
                const tierIcons = MODES.filter(m => m !== "Overall").map(m => {
                    const t = getTier(p.elo[m]);
                    return `<div class="tier-icon t-${t.toLowerCase()}" title="${m}: ${t}">${t}</div>`;
                }).join('');

                body.innerHTML += `
                    <tr>
                        <td class="rank-num">${i + 1}</td>
                        <td>
                            <div class="player-cell">
                                <img src="https://mc-heads.net/avatar/${ign}/44" class="avatar">
                                <div><div class="p-name">${ign}</div><div class="p-sub">Combat Master</div></div>
                            </div>
                        </td>
                        <td><span class="region-badge">NA</span></td>
                        <td><div class="tier-list">${tierIcons}</div></td>
                        <td class="rating-col">${score}</td>
                    </tr>
                `;
            });
        }

        function doSearch() { render(document.getElementById('search').value); }
        refresh();
        setInterval(refresh, 15000);
    </script>
</body>
</html>
