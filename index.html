<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraktu's Basement | Rankings</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #080a10;
            --bg2:         #0d0f18;
            --panel:       #11141d;
            --panel-hover: #171b27;
            --border:      rgba(255,255,255,0.06);
            --border-mid:  rgba(255,255,255,0.1);
            --text:        #e8eaf0;
            --muted:       #4a5268;
            --accent:      #5865f2;
            --gold:        #e8a200;
            --silver:      #8090a8;
            --bronze:      #a06030;
            --ht1: #e84040; --lt1: #e86060;
            --ht2: #e87820; --lt2: #e89840;
            --ht3: #d4a800; --lt3: #d4bc40;
            --ht4: #3aaa50; --lt4: #60c070;
            --ht5: #4a70e8; --lt5: #7090e0;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(88,101,242,0.07) 0%, transparent 70%);
        }

        /* ── NAVBAR ──────────────────────────────────────────── */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; height: 64px;
            background: rgba(13,15,24,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem;
            letter-spacing: 2px; color: var(--text); cursor: pointer; text-decoration: none;
        }
        .logo span { color: var(--gold); }
        .nav-right { display: flex; gap: 12px; align-items: center; }
        .search-wrap {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 8px; padding: 0 14px; height: 38px; transition: border-color 0.2s, background 0.2s;
        }
        .search-wrap:focus-within { border-color: var(--border-mid); background: rgba(255,255,255,0.06); }
        .search-wrap svg { color: var(--muted); flex-shrink: 0; }
        .search-wrap input { background: none; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; width: 180px; outline: none; }
        .search-wrap input::placeholder { color: var(--muted); }
        .discord-btn {
            display: flex; align-items: center; gap: 6px;
            background: var(--accent); color: #fff; text-decoration: none;
            padding: 0 16px; height: 38px; border-radius: 8px;
            font-weight: 700; font-size: 0.85rem; transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 2px 12px rgba(88,101,242,0.3);
        }
        .discord-btn:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(88,101,242,0.45); }

        /* ── TABS ────────────────────────────────────────────── */
        .tabs-row {
            display: flex; gap: 4px; padding: 12px 40px 0;
            overflow-x: auto; border-bottom: 1px solid var(--border);
            background: var(--bg2);
        }
        .tabs-row::-webkit-scrollbar { display: none; }
        .tab {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            padding: 8px 18px 12px; cursor: pointer; color: var(--muted);
            font-size: 0.72rem; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
            white-space: nowrap; transition: color 0.2s;
            border-bottom: 2px solid transparent; margin-bottom: -1px; user-select: none;
        }
        .tab:hover { color: rgba(255,255,255,0.6); }
        .tab.active { color: #fff; border-bottom-color: #fff; }

        .tab-icon-wrap {
            width: 52px; height: 52px; border-radius: 14px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }
        .tab:hover .tab-icon-wrap { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .tab.active .tab-icon-wrap { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.16); }

        /* ── CONTENT ─────────────────────────────────────────── */
        .content { padding: 0 40px 60px; max-width: 1400px; margin: 0 auto; }

        /* ── LEADERBOARD ─────────────────────────────────────── */
        .lb-head {
            display: grid; grid-template-columns: 110px 1fr 80px 1fr 120px;
            padding: 12px 0; color: var(--muted); font-size: 0.65rem;
            font-weight: 800; letter-spacing: 1.8px; text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }
        .lb-head > * { padding: 0 8px; }

        .lb-row {
            display: grid; grid-template-columns: 110px 1fr 80px 1fr 120px;
            align-items: center; border-bottom: 1px solid var(--border);
            transition: background 0.15s; cursor: pointer;
            position: relative; min-height: 80px;
            animation: fadeUp 0.35s both;
        }
        .lb-row:hover { background: var(--panel-hover); }
        .lb-row:nth-child(1){animation-delay:.04s} .lb-row:nth-child(2){animation-delay:.08s}
        .lb-row:nth-child(3){animation-delay:.12s} .lb-row:nth-child(4){animation-delay:.16s}
        .lb-row:nth-child(5){animation-delay:.20s}

        /* Gold/silver/bronze left accent stripe */
        .rank-1::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(180deg,#e8a200,#c47800); border-radius:0 2px 2px 0; }
        .rank-2::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(180deg,#8090a8,#5a6878); border-radius:0 2px 2px 0; }
        .rank-3::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(180deg,#c0783a,#704020); border-radius:0 2px 2px 0; }

        .rank-cell { display: flex; align-items: center; height: 100%; padding-left: 16px; }
        .rank-badge {
            display: flex; align-items: center; justify-content: center;
            width: 68px; height: 52px;
            font-family: 'Bebas Neue', sans-serif; font-size: 2rem;
            clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%); flex-shrink: 0;
        }
        .rank-1 .rank-badge { background: linear-gradient(135deg,#f0b000,#c47800); color:#fff; }
        .rank-2 .rank-badge { background: linear-gradient(135deg,#8090a8,#5a6878); color:#fff; }
        .rank-3 .rank-badge { background: linear-gradient(135deg,#c0783a,#704020); color:#fff; }
        .rank-other .rank-badge { background: rgba(255,255,255,0.04); color:var(--muted); font-size:1.5rem; }

        .player-cell { display: flex; align-items: center; gap: 14px; padding: 12px 8px; }
        .player-avatar { width: 48px; height: 48px; border-radius: 8px; image-rendering: pixelated; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        .player-name { font-size: 1.1rem; font-weight: 800; color: #fff; line-height: 1.2; }
        .player-rank-label { display: flex; align-items: center; gap: 5px; font-size: 0.75rem; color: var(--muted); font-weight: 600; margin-top: 3px; }
        .rank-diamond { width: 8px; height: 8px; border-radius: 1px; transform: rotate(45deg); flex-shrink: 0; }

        .region-cell { display: flex; align-items: center; padding: 0 8px; }
        .region-badge { padding: 3px 9px; border-radius: 5px; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; }
        .region-NA { background: rgba(192,57,43,0.25); color:#e05040; border: 1px solid rgba(192,57,43,0.3); }
        .region-EU { background: rgba(39,174,96,0.2); color:#3cca78; border: 1px solid rgba(39,174,96,0.25); }

        /* Tier icon circles in the row */
        .tiers-cell { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 8px; }
        .tier-icon-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tier-circle {
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.04); border: 2px solid;
            transition: transform 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
        }
        .tier-circle:hover { transform: scale(1.18); }
        .tier-lbl { font-size: 0.55rem; font-weight: 900; letter-spacing: 0.3px; text-align: center; opacity: 0.85; }

        /* tier border + label colours */
        .t-ht1{border-color:var(--ht1)}.lbl-ht1{color:var(--ht1)}
        .t-lt1{border-color:var(--lt1)}.lbl-lt1{color:var(--lt1)}
        .t-ht2{border-color:var(--ht2)}.lbl-ht2{color:var(--ht2)}
        .t-lt2{border-color:var(--lt2)}.lbl-lt2{color:var(--lt2)}
        .t-ht3{border-color:var(--ht3)}.lbl-ht3{color:var(--ht3)}
        .t-lt3{border-color:var(--lt3)}.lbl-lt3{color:var(--lt3)}
        .t-ht4{border-color:var(--ht4)}.lbl-ht4{color:var(--ht4)}
        .t-lt4{border-color:var(--lt4)}.lbl-lt4{color:var(--lt4)}
        .t-ht5{border-color:var(--ht5)}.lbl-ht5{color:var(--ht5)}
        .t-lt5{border-color:var(--lt5)}.lbl-lt5{color:var(--lt5)}

        /* glow tints on active tiers */
        .t-ht1:hover{box-shadow:0 0 8px rgba(232,64,64,0.35)}
        .t-lt1:hover{box-shadow:0 0 8px rgba(232,96,96,0.35)}
        .t-ht2:hover{box-shadow:0 0 8px rgba(232,120,32,0.35)}
        .t-lt2:hover{box-shadow:0 0 8px rgba(232,152,64,0.35)}
        .t-ht3:hover{box-shadow:0 0 8px rgba(212,168,0,0.35)}
        .t-lt3:hover{box-shadow:0 0 8px rgba(212,188,64,0.35)}
        .t-ht4:hover{box-shadow:0 0 8px rgba(58,170,80,0.35)}
        .t-lt4:hover{box-shadow:0 0 8px rgba(96,192,112,0.35)}
        .t-ht5:hover{box-shadow:0 0 8px rgba(74,112,232,0.35)}
        .t-lt5:hover{box-shadow:0 0 8px rgba(112,144,224,0.35)}

        .pts-cell { text-align: right; padding-right: 20px; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--muted); }
        .pts-cell span { color: var(--gold); }

        /* ── TIER GRID ───────────────────────────────────────── */
        .tier-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-top: 10px; }
        .tier-col {
            background: var(--panel); border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .tier-col:hover { border-color: rgba(255,255,255,0.1); }
        .tier-col-header {
            padding: 12px 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
        }
        .tier-col-sub { font-size: 0.62rem; font-weight: 800; color: rgba(255,255,255,0.3); font-family: 'DM Sans', sans-serif; letter-spacing: 0.5px; }
        .tier-player-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s; cursor: pointer;
        }
        .tier-player-row:last-child { border-bottom: none; }
        .tier-player-row:hover { background: var(--panel-hover); }
        .tier-player-left { display: flex; align-items: center; gap: 8px; }
        .tier-small-avatar { width: 24px; height: 24px; border-radius: 5px; image-rendering: pixelated; }
        .tier-small-name { font-size: 0.82rem; font-weight: 700; }
        .tier-elo-num { font-size: 0.6rem; color: var(--muted); font-weight: 700; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.5px; }
        .empty-tier { padding: 20px; text-align: center; color: var(--muted); font-size: 0.78rem; }

        .empty-state { padding: 80px 20px; text-align: center; color: var(--muted); }
        .empty-state h3 { font-size: 1.1rem; font-weight: 800; }
        .empty-state p { font-size: 0.9rem; margin-top: 8px; }

        /* ── SECTION HEADER ──────────────────────────────────── */
        .section-header {
            display: flex; align-items: center; gap: 10px;
            padding: 20px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 0;
        }
        .section-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1.5px; color: rgba(255,255,255,0.5); }
        .section-header .player-count { font-size: 0.7rem; font-weight: 800; color: var(--muted); background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 20px; letter-spacing: 0.5px; }

        .fade-in { animation: fadeUp 0.35s cubic-bezier(0.2,0.8,0.2,1) both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>

// ── Constants ─────────────────────────────────────────────────
const MODES = ["Overall","Vanilla","LTMs","UHC","Pot","NethOP","SMP","Sword","Axe","Mace"];
const TIER_PTS = { HT1:50,LT1:45,HT2:40,LT2:35,HT3:30,LT3:25,HT4:20,LT4:15,HT5:10,LT5:5 };
const COMBAT_RANKS = [[380,"Combat Legend"],[280,"Combat Master"],[190,"Combat Ace"],[120,"Combat Expert"],[60,"Combat Warrior"],[0,"Combat Rookie"]];
const RANK_COLORS  = {"Combat Legend":"#e84040","Combat Master":"#e87820","Combat Ace":"#d4a800","Combat Expert":"#3aaa50","Combat Warrior":"#4a70e8","Combat Rookie":"#5a6070"};
const DISPLAY_MODES = ["LTMs","Vanilla","UHC","Pot","NethOP","SMP","Sword","Axe","Mace"];

let currentMode = "Overall";
let players = {};

function getTier(elo) {
    if(elo>=2400)return"HT1";if(elo>=2200)return"LT1";
    if(elo>=2000)return"HT2";if(elo>=1800)return"LT2";
    if(elo>=1600)return"HT3";if(elo>=1400)return"LT3";
    if(elo>=1300)return"HT4";if(elo>=1200)return"LT4";
    if(elo>=1100)return"HT5";return"LT5";
}
function totalPoints(p) { return Object.values(p.elo).reduce((s,e)=>s+(TIER_PTS[getTier(e)]||0),0); }
function combatRank(pts) { for(const[t,l]of COMBAT_RANKS)if(pts>=t)return l; return"Combat Rookie"; }

function tierCircle(mode, elo) {
    const tier   = getTier(elo);
    const cls    = tier.toLowerCase();
    const iconFn = ICONS[mode];
    const iconSvg = iconFn ? iconFn(16) : '';
    return `
    <div class="tier-icon-wrap">
        <div class="tier-circle t-${cls}" title="${mode}: ${tier} (${elo})">${iconSvg}</div>
        <div class="tier-lbl lbl-${cls}">${tier}</div>
    </div>`;
}

async function refresh() {
    try {
        const res  = await fetch('players.json?t=' + Date.now());
        const data = await res.json();
        players    = data.players;
        renderTabs();
        render();
    } catch(e) { console.log("Waiting for data..."); }
}

function renderTabs() {
    document.getElementById('tabs').innerHTML = MODES.map(m => {
        const iconFn  = ICONS[m];
        const iconSvg = iconFn ? iconFn(26) : '';
        return `
        <div class="tab ${m===currentMode?'active':''}" onclick="setMode('${m}')">
            <div class="tab-icon-wrap">${iconSvg}</div>
            ${m}
        </div>`;
    }).join('');
}

function setMode(m) {
    if(currentMode===m) return;
    currentMode = m;
    renderTabs();
    render();
}

function render() {
    const el     = document.getElementById('content');
    const search = document.getElementById('search').value.toLowerCase();
    const list   = Object.values(players).filter(p=>(p.ign||p.name).toLowerCase().includes(search));
    el.innerHTML = '';
    if(currentMode==='Overall') renderOverall(el, list);
    else                        renderGrid(el, list);
}

function renderOverall(el, list) {
    list.sort((a,b)=>totalPoints(b)-totalPoints(a));
    if(!list.length){
        el.innerHTML=`<div class="empty-state"><h3>No players yet</h3><p>Verify some players to get started!</p></div>`;
        return;
    }

    let html = `<div>
        <div class="lb-head">
            <div>#</div><div>PLAYER</div><div>REGION</div><div>TIERS</div>
            <div style="text-align:right;padding-right:20px">PTS</div>
        </div>`;

    list.forEach((p,i)=>{
        const ign     = p.ign||p.name;
        const pts     = totalPoints(p);
        const cr      = combatRank(pts);
        const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
        const tierIcons = DISPLAY_MODES.map(m=>tierCircle(m, p.elo[m]??1000)).join('');

        html+=`
        <div class="lb-row ${rankCls}">
            <div class="rank-cell"><div class="rank-badge">${i+1}</div></div>
            <div class="player-cell">
                <img class="player-avatar" src="https://mc-heads.net/avatar/${ign}/48" loading="lazy">
                <div>
                    <div class="player-name">${ign}</div>
                    <div class="player-rank-label">
                        <div class="rank-diamond" style="background:${RANK_COLORS[cr]||'#5a6070'}"></div>
                        ${cr} &nbsp;·&nbsp; ${pts} pts
                    </div>
                </div>
            </div>
            <div class="region-cell"><span class="region-badge region-NA">NA</span></div>
            <div class="tiers-cell">${tierIcons}</div>
            <div class="pts-cell"><span>${pts}</span></div>
        </div>`;
    });

    el.innerHTML = html + `</div>`;
}

function renderGrid(el, list) {
    const cols={1:[],2:[],3:[],4:[],5:[]};
    list.forEach(p=>{
        const elo=p.elo[currentMode];
        if(elo===undefined)return;
        const tier=getTier(elo);
        const num=parseInt(tier.replace(/\D/g,''));
        if(cols[num])cols[num].push({...p,_elo:elo,_tier:tier});
    });

    const total=Object.values(cols).reduce((s,c)=>s+c.length,0);
    if(!total){
        el.innerHTML=`<div class="empty-state"><h3>No players in ${currentMode} yet</h3><p>Report some matches to populate this!</p></div>`;
        return;
    }

    const HEAD_COLORS=['#e84040','#e87820','#d4a800','#3aaa50','#4a70e8'];
    let html=`<div class="tier-grid">`;
    for(let i=1;i<=5;i++){
        const col=cols[i].sort((a,b)=>b._elo-a._elo);
        const rows=col.map(p=>{
            const ign=p.ign||p.name;
            return`<div class="tier-player-row">
                <div class="tier-player-left">
                    <img class="tier-small-avatar" src="https://mc-heads.net/avatar/${ign}/24" loading="lazy">
                    <span class="tier-small-name">${ign}</span>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
                    <span class="tier-lbl lbl-${p._tier.toLowerCase()}">${p._tier}</span>
                    <span class="tier-elo-num">${p._elo}</span>
                </div>
            </div>`;
        }).join('')||`<div class="empty-tier">Empty</div>`;

        html+=`<div class="tier-col fade-in" style="animation-delay:${(i-1)*0.06}s">
            <div class="tier-col-header" style="border-left:3px solid ${HEAD_COLORS[i-1]}">
                <span>TIER ${i}</span>
                <span class="tier-col-sub">${col.length} PLAYER${col.length!==1?'S':''}</span>
            </div>
            ${rows}
        </div>`;
    }
    el.innerHTML=html+`</div>`;
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
